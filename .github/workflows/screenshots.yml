name: Update Documentation Screenshots

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'webui/frontend/src/**'
      - 'src/chatty_commander/web/**'

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install uv && uv sync

      # The backend is started by Playwright's `webServer` (see
      # webui/frontend/playwright.config.ts), which owns :8100 and sets
      # CHATTY_DISABLE_RATE_LIMIT=1. Starting it manually here too caused a
      # port conflict in CI (reuseExistingServer is false when CI is set).

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webui/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: webui/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: webui/frontend

      - name: Generate screenshots
        run: npx playwright test tests/e2e/screenshots.spec.ts --reporter=list
        working-directory: webui/frontend

      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update screenshots [skip ci]"
          file_pattern: "docs/screenshots/*.png"
