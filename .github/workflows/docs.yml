name: Docs

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install mkdocs
      - name: Build site
        # The repo's mkdocs.yml lives in docs/ and its implied docs_dir
        # (docs/docs) does not exist, so generate a CI config at the repo
        # root that serves the docs/ tree directly.
        run: |
          cat > mkdocs-ci.yml <<'EOF'
          site_name: Chatty Commander
          docs_dir: docs
          EOF
          mkdocs build -f mkdocs-ci.yml --site-dir site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
