name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    # Lint/type findings are reported but do not block the test signal.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Run mypy
        run: uv run mypy src

      - name: Run ruff
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Run quick system smoke
        run: uv run pytest tests/test_system_routes.py -q --no-cov

      - name: Run pytest (skip heavy perf)
        run: uv run pytest -q --no-cov -k "not performance"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webui/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: webui/frontend

      - name: Build frontend
        run: npm run build
        working-directory: webui/frontend

  e2e-test:
    runs-on: ubuntu-latest
    needs: [test, frontend-build]
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd webui/frontend
          npm install -g pnpm
          pnpm i

      - name: Install Playwright browsers
        run: |
          cd webui/frontend
          pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: |
          cd webui/frontend
          pnpm run test:e2e

  performance-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Run performance benchmarks
        run: |
          # The perf suite is currently empty (tests/perf/ was cleared in the
          # baseline reset); exit code 5 means "no tests collected" and is
          # treated as a skip rather than a failure.
          set +e
          uv run pytest -q --no-cov -k "perf" --benchmark-only --benchmark-json=benchmark.json
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "No performance/benchmark tests collected; skipping."
            exit 0
          fi
          exit "$rc"

      - name: Upload benchmark results
        if: hashFiles('benchmark.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json

  build:
    runs-on: ubuntu-latest
    needs: [test, performance-test]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build

      - name: Test package installation
        run: |
          pip install dist/*.whl
          python -c "import chatty_commander; print('Package installed successfully')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: chatty-commander:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm chatty-commander:latest python -m chatty_commander.cli.main --help

  notify:
    runs-on: ubuntu-latest
    needs: [test, frontend-build, performance-test, build, docker]
    if: always()

    steps:
      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed! Check the logs for details."
          # Add notification logic here (Slack, Discord, etc.)
