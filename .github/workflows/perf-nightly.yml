name: Perf Nightly

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Run performance tests
        run: |
          # The perf suite is currently empty (tests/perf/ was cleared in the
          # baseline reset); exit code 5 means "no tests collected" and is
          # treated as a skip rather than a failure.
          set +e
          uv run pytest -q --no-cov -k performance -s
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "No performance tests collected; skipping."
            exit 0
          fi
          exit "$rc"
